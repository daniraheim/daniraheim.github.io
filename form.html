<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now Form</title>

    <link rel="stylesheet" href="./css/styles.css">
</head>

<!--HTML for Form-->

<body>
    <form action="https://formspree.io/f/xdkakddb" method="POST">
    <h1>Join Now!</h1>
    <div class="form">
        <label>First Name:
            <input type="text" name="first" placeholder="First Name" required>
        </label>
        <br>
        <br>
        <label>Last Name:
            <input type="text" name="last" placeholder="Last Name" required>
        </label>
        <br>
        <br>
        <label>Email:
            <input type="email" name="email" placeholder="Email Address" required>
        </label>
        <br>
        <br>
        <label>Select Your Gender: (optional)</label>
        <br>
        <input type="radio" name="radio" value="Male">Male
        <br>
        <input type="radio" name="radio" value="Female">Female
        <br>
        <input type="radio" name="radio" value="Other">Other
        <br>
        <br>
        <label>Date of Birth: 
            <input type="date" name="date"> 
        </label>
        <br>
        <br>
        <label>
            Phone Number:
            <input type="tel" name="phone" placeholder="817-123-0000" required>
        </label>
        <br>
        <br>
        <label>Payment Schedule</label>
        <br>
        <select> 
            <option value="">Yearly</option>
            <option value="">Quarterly</option>
            <option selected value="">Monthly</option>
        </select>
        <br>
        <br>
        <label>Membership Type</label>
        <br>
        <label>Standard
            <input type="checkbox" name="membership" value="Beginner" id="Beginner" onclick="checkOnlyOne(this)">
         </label>
        <br>
        <label>Premium
             <input type="checkbox" name="membership" value="Intermediate" id="Intermediate" onclick="checkOnlyOne(this)">
            </label>
        <br>    
        <label>Exclusive
            <input type="checkbox" name="membership" value="Advanced" id="Advanced" onclick="checkOnlyOne(this)"> 
        </label>
        <br>
        <script>
            function checkOnlyOne(checkbox){
                const checkboxes = document.querySelectorAll('input[name="membership"]');
                checkboxes.forEach((box) =>{
                    if (box !== checkbox) box.checked = false;
                });
            }
        </script>
        <br>
        <label>Emergency Contact Information</label>
        <br>
        <label>First Name:
            <input type="text" name="first" placeholder="First Name" required>
        </label>
        <label>Last Name:
            <input type="text" name="last" placeholder="Last Name" required>
        </label>
        <br>
        <label>Relationship:
            <input type="text" name="relationship" placeholder="e.g., Mother, Father">
        </label>
        <br>
        <label>
            Phone Number:
            <input type="tel" name="phone" placeholder="817-123-0000" required>
        </label>  
        <br>
        <br>
        <input class="register" type="submit" value="Register">
    </div>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
